services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: notesdb
    healthcheck:
      
      test: ["CMD-SHELL", "pg_isready -U user -d notesdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/notesdb
      - PYTHONPATH=.
    depends_on:
      db:
        condition: service_healthy