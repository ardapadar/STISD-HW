<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> UYG414 SPECIAL TOPICS IN SOFTWARE DEVELOPMENT HW - Intelligent Note Microservice</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5; --danger: #ef4444; --success: #10b981; --bg: #f8fafc;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; color: #1e293b; }
        
        
        .sidebar { width: 350px; background: white; border-right: 1px solid #e2e8f0; padding: 30px; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.02); }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; background: #f1f5f9; }
        
        h1, h2 { margin-top: 0; font-weight: 700; color: #0f172a; }
        .logo { font-size: 1.5rem; color: var(--primary); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }

       
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        input, textarea { width: 100%; border: 1px solid #cbd5e1; border-radius: 10px; padding: 12px; font-size: 1rem; transition: 0.2s; box-sizing: border-box; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); ring: 2px solid var(--primary); }
        
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:hover { background: #4338ca; transform: translateY(-2px); }

      
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .note-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: 0.3s; position: relative; border-top: 6px solid var(--success); }
        .note-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .note-card.important { border-top-color: var(--danger); }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .badge { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; }
        .badge-danger { background: #fee2e2; color: var(--danger); }
        
        .content { font-size: 0.95rem; line-height: 1.6; color: #475569; margin-bottom: 20px; }
        .ai-box { background: #f8fafc; border-radius: 8px; padding: 12px; font-size: 0.85rem; border: 1px solid #e2e8f0; }
        .del-btn { color: #94a3b8; cursor: pointer; transition: 0.2s; background: none; border: none; font-size: 1.1rem; }
        .del-btn:hover { color: var(--danger); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo"><i class="fas fa-brain"></i> UYG414 SPECIAL TOPICS IN SOFTWARE DEVELOPMENT HW</div>
        <h2>Yeni Not 📝</h2>
        <div class="form-group">
            <label>Not Başlığı</label>
            <input id="t" placeholder="Örn: Proje Teslimi">
        </div>
        <div class="form-group">
            <label>Detaylar</label>
            <textarea id="c" rows="5" placeholder="Notunuzu buraya yazın..."></textarea>
        </div>
        <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
            <input type="checkbox" id="imp" style="width: auto;"> 
            <label style="margin:0">Önemli Olarak İşaretle</label>
        </div>
        <button class="btn" onclick="ekle()"><i class="fas fa-plus"></i> Notu Kaydet</button>
    </div>

    <div class="main-content">
        <h1>Akıllı Notlarım AI RANKING <small style="font-size: 0.5em; vertical-align: middle; color: #64748b;">Microservice v1.1</small></h1>
        <div id="liste" class="grid"></div>
    </div>

    <script>
        const API_KEY = "kawien_secret_key_2024";

        async function listele() {
            try {
                const res = await fetch('/api/v1/notes/', { headers: { 'X-API-KEY': API_KEY } });
                const veriler = await res.json();
                document.getElementById('liste').innerHTML = veriler.map(n => `
                    <div class="note-card ${n.is_important ? 'important' : ''}">
                        <div class="card-header">
                            <div>
                                ${n.is_important ? '<span class="badge badge-danger"><i class="fas fa-fire"></i> ÖNEMLİ</span>' : ''}
                                <h3 style="margin: 5px 0 0 0;">${n.title}</h3>
                            </div>
                            <button class="del-btn" onclick="sil(${n.id})"><i class="fas fa-trash"></i></button>
                        </div>
                        <p class="content">${n.content}</p>
                        <div class="ai-box">
                            <i class="fas fa-robot" style="color: var(--primary);"></i> 
                            <b>AI Analizi:</b> <i>${n.ai_summary}</i>
                        </div>
                    </div>
                `).join('');
            } catch (err) { console.error("Veri çekilemedi:", err); }
        }

        async function ekle() {
            const title = document.getElementById('t').value;
            const content = document.getElementById('c').value;
            const isManualImportant = document.getElementById('imp').checked;
            if(!title || !content) return alert("Başlık ve içerik boş bırakılamaz!");

            await fetch('/api/v1/notes/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-API-KEY': API_KEY },
                body: JSON.stringify({ title, content, is_important: isManualImportant })
            });
            document.getElementById('t').value = ''; document.getElementById('c').value = '';
            document.getElementById('imp').checked = false;
            listele();
        }

        async function sil(id) {
            if(confirm('Bu notu  hafızadan silmek istediğine emin misin?')) {
                await fetch('/api/v1/notes/' + id, { method: 'DELETE', headers: { 'X-API-KEY': API_KEY } });
                listele();
            }
        }
        listele();
    </script>
</body>
</html>
